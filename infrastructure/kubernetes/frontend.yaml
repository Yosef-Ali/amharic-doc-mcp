apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-config
  namespace: amharic-doc-system
data:
  VITE_API_BASE_URL: "http://backend-service:8000"
  VITE_MINIO_ENDPOINT: "http://minio-service:9000"
  VITE_DEFAULT_LANGUAGE: "en"
  VITE_SUPPORTED_LANGUAGES: "en,am"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: amharic-doc-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: amharic-doc-frontend:latest
        ports:
        - containerPort: 3000
        envFrom:
        - configMapRef:
            name: frontend-config
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: amharic-doc-system
spec:
  selector:
    app: frontend
  ports:
  - port: 3000
    targetPort: 3000
  type: LoadBalancer