# Application-Level Alerts for Amharic Document Processing System

groups:
  - name: application_alerts
    interval: 30s
    rules:
      # API Health Alerts
      - alert: APIDown
        expr: up{job="backend-api"} == 0
        for: 2m
        labels:
          severity: critical
          component: api
        annotations:
          summary: "Backend API is down"
          description: "Backend API has been down for more than 2 minutes"

      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
          component: api
        annotations:
          summary: "High error rate detected"
          description: "API error rate is {{ $value | humanizePercentage }} over the last 5 minutes"

      - alert: SlowResponseTime
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2
        for: 10m
        labels:
          severity: warning
          component: api
        annotations:
          summary: "API response time degraded"
          description: "95th percentile response time is {{ $value }}s (threshold: 2s)"

      # Document Processing Alerts
      - alert: DocumentProcessingFailureRate
        expr: rate(document_processing_failures_total[15m]) > 0.1
        for: 10m
        labels:
          severity: warning
          component: processing
        annotations:
          summary: "High document processing failure rate"
          description: "Document processing failure rate is {{ $value | humanizePercentage }}"

      - alert: DocumentProcessingQueueBacklog
        expr: celery_queue_length{queue="standard"} > 1000
        for: 15m
        labels:
          severity: warning
          component: celery
        annotations:
          summary: "Large processing queue backlog"
          description: "{{ $labels.queue }} queue has {{ $value }} pending tasks"

      - alert: DocumentProcessingStalled
        expr: rate(document_processing_completed_total[30m]) == 0
        for: 30m
        labels:
          severity: critical
          component: processing
        annotations:
          summary: "Document processing has stalled"
          description: "No documents have been processed in the last 30 minutes"

      # Celery Worker Alerts
      - alert: CeleryWorkerDown
        expr: up{job="celery-worker"} == 0
        for: 5m
        labels:
          severity: critical
          component: celery
        annotations:
          summary: "Celery worker is down"
          description: "Celery worker has been down for more than 5 minutes"

      - alert: CeleryTaskFailureRate
        expr: rate(celery_task_failed_total[15m]) / rate(celery_task_total[15m]) > 0.1
        for: 10m
        labels:
          severity: warning
          component: celery
        annotations:
          summary: "High Celery task failure rate"
          description: "Celery task failure rate is {{ $value | humanizePercentage }}"

      - alert: CeleryWorkerOverloaded
        expr: celery_active_tasks > celery_worker_concurrency * 0.9
        for: 15m
        labels:
          severity: warning
          component: celery
        annotations:
          summary: "Celery workers are overloaded"
          description: "Active tasks ({{ $value }}) approaching worker capacity"

      # OCR Processing Alerts
      - alert: LowOCRConfidence
        expr: avg(ocr_confidence_score) < 0.85
        for: 30m
        labels:
          severity: warning
          component: ocr
        annotations:
          summary: "OCR confidence scores are low"
          description: "Average OCR confidence is {{ $value | humanizePercentage }} (threshold: 85%)"

      - alert: OCRProcessingTimeout
        expr: rate(ocr_processing_timeout_total[15m]) > 0.05
        for: 10m
        labels:
          severity: warning
          component: ocr
        annotations:
          summary: "High OCR processing timeout rate"
          description: "OCR timeout rate is {{ $value | humanizePercentage }}"

      # Search Performance Alerts
      - alert: SearchLatencyHigh
        expr: histogram_quantile(0.95, rate(search_query_duration_seconds_bucket[5m])) > 0.5
        for: 10m
        labels:
          severity: warning
          component: search
        annotations:
          summary: "Search query latency is high"
          description: "95th percentile search latency is {{ $value }}s (threshold: 500ms)"

      - alert: SearchIndexingBacklog
        expr: search_indexing_queue_length > 500
        for: 20m
        labels:
          severity: warning
          component: search
        annotations:
          summary: "Search indexing backlog is high"
          description: "{{ $value }} documents waiting to be indexed"

      # Memory and Resource Alerts
      - alert: HighMemoryUsage
        expr: (container_memory_usage_bytes / container_spec_memory_limit_bytes) > 0.85
        for: 10m
        labels:
          severity: warning
          component: resources
        annotations:
          summary: "High memory usage detected"
          description: "Container {{ $labels.container }} is using {{ $value | humanizePercentage }} of available memory"

      - alert: DiskSpaceRunningOut
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) < 0.15
        for: 10m
        labels:
          severity: warning
          component: resources
        annotations:
          summary: "Disk space running low"
          description: "Only {{ $value | humanizePercentage }} disk space remaining"

      # SLA Alerts
      - alert: ProcessingSLAViolation
        expr: histogram_quantile(0.95, rate(document_processing_duration_seconds_bucket[1h])) > 1800
        for: 30m
        labels:
          severity: critical
          component: sla
        annotations:
          summary: "Document processing SLA violated"
          description: "95th percentile processing time is {{ $value }}s (SLA: 30 minutes)"

      - alert: APIAvailabilitySLAViolation
        expr: (sum(rate(http_requests_total{status=~"2.."}[1h])) / sum(rate(http_requests_total[1h]))) < 0.999
        for: 15m
        labels:
          severity: critical
          component: sla
        annotations:
          summary: "API availability SLA violated"
          description: "API availability is {{ $value | humanizePercentage }} (SLA: 99.9%)"