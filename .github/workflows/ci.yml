name: Continuous Integration

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres_pass
          POSTGRES_USER: postgres
          POSTGRES_DB: amharic_doc_system_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      mongodb:
        image: mongo:7
        env:
          MONGO_INITDB_ROOT_USERNAME: admin
          MONGO_INITDB_ROOT_PASSWORD: mongo_pass
        options: >-
          --health-cmd "echo 'db.runCommand(\"ping\").ok' | mongosh localhost:27017/test --quiet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 27017:27017
      
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y tesseract-ocr tesseract-ocr-amh
    
    - name: Install Python dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
    
    - name: Lint with Ruff
      run: |
        cd backend
        ruff check .
        ruff format --check .
    
    - name: Type check with MyPy
      run: |
        cd backend
        mypy src/
    
    - name: Security check with Bandit
      run: |
        cd backend
        bandit -c pyproject.toml -r src/
      continue-on-error: false

    - name: Safety check
      run: |
        cd backend
        safety check --json
      continue-on-error: false
    
    - name: Run tests
      env:
        DATABASE_URL: postgresql://postgres:postgres_pass@localhost:5432/amharic_doc_system_test
        MONGODB_URL: mongodb://admin:mongo_pass@localhost:27017/test?authSource=admin
        REDIS_URL: redis://localhost:6379/0
      run: |
        cd backend
        pytest tests/ -v --cov=src --cov-report=xml --cov-report=term-missing
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: backend/coverage.xml
        flags: backend
        name: backend-coverage

  frontend-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    
    - name: Install dependencies
      run: |
        cd frontend
        npm ci
    
    - name: Lint code
      run: |
        cd frontend
        npm run lint
    
    - name: Type check
      run: |
        cd frontend
        npm run type-check
    
    - name: Run tests
      run: |
        cd frontend
        npm test -- --coverage --watchAll=false
    
    - name: Build application
      run: |
        cd frontend
        npm run build

  security-scan:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        severity: 'HIGH,CRITICAL'
        exit-code: '1'

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test, security-scan]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build backend Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        file: ./backend/Dockerfile
        tags: amharic-doc-backend:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        push: false
        load: true

    - name: Build frontend Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        file: ./frontend/Dockerfile
        tags: amharic-doc-frontend:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        push: false
        load: true

    - name: Test backend Docker image
      run: |
        docker run --rm -d --name test-backend amharic-doc-backend:${{ github.sha }}
        sleep 5
        docker logs test-backend
        docker stop test-backend || true

    - name: Test frontend Docker image
      run: |
        docker run --rm -d --name test-frontend -p 3001:3000 amharic-doc-frontend:${{ github.sha }}
        sleep 5
        docker logs test-frontend
        docker stop test-frontend || true

  deployment-gate:
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    steps:
    - uses: actions/checkout@v4

    - name: Deployment readiness check
      run: |
        echo "✅ All tests passed"
        echo "✅ Security scans completed"
        echo "✅ Docker images built successfully"
        echo "Ready for deployment to ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}"

    - name: Create deployment summary
      run: |
        cat >> $GITHUB_STEP_SUMMARY << 'EOF'
        ## Deployment Summary

        **Branch**: ${{ github.ref_name }}
        **Commit**: ${{ github.sha }}
        **Status**: ✅ Ready for deployment

        ### Quality Gates
        - ✅ Backend tests passed
        - ✅ Frontend tests passed
        - ✅ Security scans completed
        - ✅ Docker images built
        - ✅ Lint checks passed

        ### Next Steps
        - Deploy to ${{ github.ref == 'refs/heads/main' && 'Production' || 'Staging' }}
        EOF